<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RunBlue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f0f0; max-width: 480px; margin: 0 auto; padding-bottom: 70px; }

    /* Header */
    .header { background: white; padding: 16px; border-bottom: 1px solid #e0e0e0; position: sticky; top: 0; z-index: 10; }
    .header h1 { font-size: 20px; font-weight: 600; color: #185FA5; }
    .header .date { font-size: 13px; color: #888; margin-top: 2px; }
    .header .pct { font-size: 13px; color: #185FA5; font-weight: 500; margin-top: 4px; }

    /* Navigation bas */
    .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: white; border-top: 1px solid #e0e0e0; display: flex; z-index: 20; }
    .nav-btn { flex: 1; padding: 12px 0; font-size: 12px; color: #888; background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .nav-btn.active { color: #185FA5; font-weight: 500; }
    .nav-icon { font-size: 20px; }

    /* Vues */
    .vue { display: none; padding: 12px; }
    .vue.active { display: block; }

    /* Bouton connexion */
    .btn-connexion { display: block; margin: 16px 0; padding: 12px; background: #185FA5; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; width: 100%; }

    /* Tâches */
    .tache { background: white; border-radius: 10px; margin-bottom: 8px; padding: 14px 12px; display: flex; align-items: center; gap: 12px; border: 1px solid #e8e8e8; }
    .tache:active { background: #f5f5f5; }
    .check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #ccc; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; cursor: pointer; }
    .check.done { background: #185FA5; border-color: #185FA5; }
    .check.done::after { content: '✓'; color: white; font-size: 14px; }
    .tache-info { flex: 1; }
    .tache-nom { font-size: 15px; color: #222; }
    .tache-nom.done { text-decoration: line-through; color: #aaa; }
    .tache-note { font-size: 11px; color: #aaa; margin-top: 2px; font-style: italic; }
    .vide { text-align: center; color: #aaa; font-size: 14px; padding: 32px; }

    /* Sélecteur de jour */
    .jours { display: flex; overflow-x: auto; gap: 8px; padding: 4px 0 12px; scrollbar-width: none; }
    .jours::-webkit-scrollbar { display: none; }
    .jour-btn { min-width: 36px; height: 36px; border-radius: 50%; border: 1px solid #e0e0e0; background: white; font-size: 13px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .jour-btn.active { background: #185FA5; color: white; border-color: #185FA5; }
    .jour-btn.today { border-color: #185FA5; color: #185FA5; font-weight: 600; }
    .jour-btn.today.active { color: white; }

    /* Tâche gestion */
    .tache-gestion { background: white; border-radius: 10px; margin-bottom: 8px; padding: 12px; border: 1px solid #e8e8e8; }
    .tache-gestion-top { display: flex; align-items: center; justify-content: space-between; }
    .tache-gestion-nom { font-size: 15px; color: #222; flex: 1; }
    .tache-gestion-note { font-size: 11px; color: #aaa; margin-top: 2px; font-style: italic; }
    .tache-actions { display: flex; gap: 8px; margin-left: 8px; }
    .btn-edit { background: #e8f0fe; color: #185FA5; border: none; border-radius: 6px; padding: 6px 10px; font-size: 12px; cursor: pointer; }
    .btn-del { background: #fce8e6; color: #c5221f; border: none; border-radius: 6px; padding: 6px 10px; font-size: 12px; cursor: pointer; }

    /* Formulaire ajout/modif */
    .formulaire { background: white; border-radius: 10px; padding: 16px; margin-bottom: 12px; border: 1px solid #e8e8e8; }
    .formulaire h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #222; }
    .champ { margin-bottom: 10px; }
    .champ label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
    .champ input, .champ select { width: 100%; padding: 10px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; background: #fafafa; }
    .champ input:focus, .champ select:focus { outline: none; border-color: #185FA5; }
    .form-actions { display: flex; gap: 8px; margin-top: 12px; }
    .btn-save { flex: 1; padding: 10px; background: #185FA5; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .btn-cancel { padding: 10px 16px; background: #f0f0f0; color: #555; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }

    /* Bouton ajouter */
    .btn-ajouter { width: 100%; padding: 12px; background: white; color: #185FA5; border: 2px dashed #185FA5; border-radius: 10px; font-size: 15px; cursor: pointer; margin-top: 4px; }

    /* Badges catégorie */
    .badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 10px; color: white; margin-top: 3px; }
    .badge-Me { background: #185FA5; }
    .badge-Luna { background: #E8760A; }
    .badge-House { background: #1A7F5A; }
    .badge-Job { background: #6B3FA0; }
    .badge-Study { background: #0891B2; }
    .badge-Sport { background: #059669; }
    .badge-Friends { background: #B5338A; }
    .badge-Family { background: #B45309; }
    .badge-Administratif { background: #555555; }

    /* Groupe catégorie */
    .groupe-titre { font-size: 12px; font-weight: 600; color: white; padding: 4px 10px; border-radius: 8px; margin: 12px 0 6px; display: inline-block; }

    /* ── PLATEAU RÉTRO ── */
    .plateau-vue { padding: 12px; }
    .retro-wrap { font-family: 'Press Start 2P', monospace; background: #1a1a2e; border-radius: 12px; padding: 16px; color: #e0e8ff; position: relative; overflow: hidden; }
    .retro-header-block { text-align: center; margin-bottom: 14px; }
    .retro-title { font-size: 11px; color: #4a9fd4; letter-spacing: 2px; margin-bottom: 8px; }
    .retro-score { font-size: 28px; color: #f5a623; }
    .retro-sub { font-size: 7px; color: #7a8aaa; margin-top: 6px; }
    .retro-next { font-size: 7px; color: #39d353; margin-top: 6px; }

    .month-toggle { display: flex; justify-content: center; gap: 8px; margin-bottom: 14px; }
    .month-btn { font-family: 'Press Start 2P', monospace; font-size: 8px; padding: 6px 12px; border: 2px solid #2a3a5a; background: #16213e; color: #7a8aaa; border-radius: 4px; cursor: pointer; }
    .month-btn.active { border-color: #4a9fd4; color: #4a9fd4; background: rgba(74,159,212,0.1); }

    .grid-wrap { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; }
    .pcase { aspect-ratio: 1; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 6px; font-family: 'Press Start 2P', monospace; border: 2px solid transparent; }
    .pcase.c1 { background: #1a3a6e; color: #4a7abf; border-color: #1e4a8a; }
    .pcase.c2 { background: #0d2b55; color: #2a5a9f; border-color: #0a2040; }
    .pcase.pdone { background: #2a2a3a; border-color: #3a3a4a; color: #4a4a6a; }
    .pcase.palier { background: #ffffff; border-color: #cccccc; color: #1a1a2e; }
    .pcase.palier.pdone { background: #7c3aed; border-color: #9f67fa; color: #ede9fe; }
    .pcase.current { background: #185FA5; border-color: #4a9fd4; color: white; font-size: 10px; animation: ppulse 1.2s ease-in-out infinite; }
    .pcase.current.palier { background: #185FA5; border-color: #4a9fd4; color: white; }
    .pcase.pempty { background: transparent; border-color: transparent; }
    @keyframes ppulse { 0%,100% { box-shadow: 0 0 0 0px rgba(74,159,212,0.6); } 50% { box-shadow: 0 0 0 5px rgba(74,159,212,0.12); } }

    .palier-cards { margin-top: 16px; }
    .palier-card { background: #16213e; border: 2px solid #2a3a5a; border-radius: 6px; padding: 12px; margin-bottom: 8px; }
    .palier-card.unlocked { border-color: #7c3aed; }
    .palier-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .palier-badge { font-size: 7px; padding: 4px 8px; border-radius: 3px; background: #f5f5f5; color: #1a1a2e; border: 1px solid #ccc; white-space: nowrap; font-family: 'Press Start 2P', monospace; }
    .palier-badge.unlocked { background: #7c3aed; color: #ede9fe; border-color: #9f67fa; }
    .palier-card-title { font-size: 7px; color: #7a8aaa; font-family: 'Press Start 2P', monospace; }
    .palier-reward { font-size: 8px; color: #e0e8ff; margin-top: 4px; font-family: 'Press Start 2P', monospace; }
    .reward-input { font-family: 'Press Start 2P', monospace; font-size: 7px; width: 100%; padding: 6px 8px; background: #1a1a2e; border: 1px solid #2a3a5a; border-radius: 3px; color: #e0e8ff; margin-top: 6px; outline: none; }
    .reward-input:focus { border-color: #4a9fd4; }
    .reward-input::placeholder { color: #7a8aaa; }
    .btn-save-reward { font-family: 'Press Start 2P', monospace; font-size: 7px; margin-top: 6px; padding: 6px 10px; background: #185FA5; border: none; border-radius: 3px; color: white; cursor: pointer; }
    .save-ok { font-size: 7px; color: #39d353; margin-top: 4px; display: none; font-family: 'Press Start 2P', monospace; }

    .confetti-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
    .popup-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; z-index: 20; background: rgba(10,10,30,0.75); }
    .popup-box { background: #16213e; border: 3px solid #7c3aed; border-radius: 8px; padding: 24px 20px; text-align: center; max-width: 260px; animation: popin 0.3s ease; }
    @keyframes popin { from { transform: scale(0.7); opacity:0; } to { transform: scale(1); opacity:1; } }
    .popup-fighting { font-size: 16px; color: #9f67fa; letter-spacing: 2px; margin-bottom: 12px; animation: flicker 0.8s ease-in-out infinite alternate; font-family: 'Press Start 2P', monospace; }
    @keyframes flicker { from { opacity:1; } to { opacity:0.6; } }
    .popup-palier { font-size: 8px; color: #39d353; margin-bottom: 8px; font-family: 'Press Start 2P', monospace; }
    .popup-reward { font-size: 8px; color: #e0e8ff; margin-bottom: 16px; min-height: 16px; font-family: 'Press Start 2P', monospace; }
    .popup-close { font-family: 'Press Start 2P', monospace; font-size: 8px; padding: 8px 16px; background: #7c3aed; color: #ede9fe; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>

  <div class="header">
    <h1>RunBlue</h1>
    <div class="date" id="header-date">Chargement...</div>
    <div class="pct" id="header-pct"></div>
  </div>

  <!-- Vue Aujourd'hui -->
  <div class="vue active" id="vue-aujourd-hui">
    <button class="btn-connexion" onclick="connexion()" id="btn-co" style="display:none">
      Se connecter avec Google
    </button>
    <div id="liste-taches"><div class="vide">Chargement...</div></div>
  </div>

  <!-- Vue Gérer -->
  <div class="vue" id="vue-gerer">
    <div class="jours" id="selecteur-jours"></div>
    <div id="formulaire-container"></div>
    <div id="liste-gestion"><div class="vide">Chargement...</div></div>
    <button class="btn-ajouter" onclick="ouvrirFormulaire()">+ Ajouter une tâche</button>
  </div>

  <!-- Vue Plateau -->
  <div class="vue plateau-vue" id="vue-plateau">
    <div class="retro-wrap" id="retro-wrap">
      <canvas class="confetti-canvas" id="confetti-canvas"></canvas>
      <div class="retro-header-block">
        <div class="retro-title">RUN BLUE</div>
        <div class="retro-score" id="plateau-score">—</div>
        <div class="retro-sub">points cumulés</div>
        <div class="retro-next" id="plateau-next"></div>
      </div>
      <div class="month-toggle">
        <button class="month-btn active" id="btn30" onclick="setMonth(30)">30 jours</button>
        <button class="month-btn" id="btn31" onclick="setMonth(31)">31 jours</button>
      </div>
      <div class="grid-wrap" id="plateau-grid"></div>
      <div class="palier-cards" id="palier-cards"></div>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="nav">
    <button class="nav-btn active" onclick="allerVue('aujourd-hui', this)">
      <span class="nav-icon">☑</span>
      Aujourd'hui
    </button>
    <button class="nav-btn" onclick="allerVue('gerer', this)">
      <span class="nav-icon">✏</span>
      Gérer
    </button>
    <button class="nav-btn" onclick="allerVue('plateau', this)">
      <span class="nav-icon">🎮</span>
      Plateau
    </button>
  </nav>

  <script>
    const CLIENT_ID = '839214144593-sipnckscvoa5rcpeni5u9nlcakvv70i7.apps.googleusercontent.com';
    const SCOPE = 'https://www.googleapis.com/auth/spreadsheets';
    const SHEET_ID = '1ddr_EGiigpdQlr7OIYgB15fHlLyGiZE3s4stRTfq7_0';

    const PALIERS = { 30:[30,60,90,120,135,150], 31:[31,62,93,124,140,155] };
    const TOTAL_CASES = { 30:150, 31:155 };
    const CELEBRATED_KEY = 'runblue_celebrated_paliers';
    const CONFETTI_COLORS = ['#7c3aed','#9f67fa','#4a9fd4','#c084fc','#60a5fa','#ffffff'];

    let jourSelectionne = new Date().getDate();
    let modeFormulaire = null;
    let ligneModif = null;
    let monthMode = 30;
    let plateauScore = 0;
    let plateauRewards = {};
    let confettiAnim = null;
    let confettiParticles = [];

    // ── Utilitaires ──────────────────────────────────────

    function getToken() { return localStorage.getItem('token'); }
    function ligneDepart(jour) { return 5 + (jour - 1) * 18; }

    function getCelebrated() {
      try { return JSON.parse(localStorage.getItem(CELEBRATED_KEY) || '[]'); } catch(e) { return []; }
    }
    function markCelebrated(p) {
      const l = getCelebrated();
      if (!l.includes(p)) { l.push(p); localStorage.setItem(CELEBRATED_KEY, JSON.stringify(l)); }
    }

    function connexion() {
      const url = 'https://accounts.google.com/o/oauth2/v2/auth'
        + '?client_id=' + CLIENT_ID
        + '&redirect_uri=' + encodeURIComponent('https://malypo.github.io/runblue/')
        + '&response_type=token'
        + '&scope=' + encodeURIComponent(SCOPE);
      window.location.href = url;
    }

    function afficherDate() {
      const options = { weekday: 'long', day: 'numeric', month: 'long' };
      document.getElementById('header-date').textContent =
        new Date().toLocaleDateString('fr-FR', options);
    }

    // ── Navigation ───────────────────────────────────────

    function allerVue(nom, btn) {
      document.querySelectorAll('.vue').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('vue-' + nom).classList.add('active');
      btn.classList.add('active');
      if (nom === 'gerer') chargerGestion(jourSelectionne);
      if (nom === 'plateau') chargerPlateau();
    }

    // ── Vue Aujourd'hui ──────────────────────────────────

    async function chargerTaches() {
      const token = getToken();
      if (!token) {
        document.getElementById('btn-co').style.display = 'block';
        document.getElementById('liste-taches').innerHTML = '<div class="vide">Connectez-vous pour voir vos tâches.</div>';
        return;
      }
      const jour = new Date().getDate();
      const debut = ligneDepart(jour) + 1;
      const fin = debut + 14;
      const plage = `Objectifs!A${debut}:D${fin}`;
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${plage}`;
      const response = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
      if (response.status === 401) {
        localStorage.removeItem('token');
        document.getElementById('btn-co').style.display = 'block';
        document.getElementById('liste-taches').innerHTML = '<div class="vide">Session expirée. Reconnectez-vous.</div>';
        return;
      }
      const data = await response.json();
      const rows = data.values || [];
      afficherTaches(rows, debut);
    }

    function afficherTaches(rows, ligneDebut) {
      const liste = document.getElementById('liste-taches');
      const taches = rows
        .map((r, i) => ({
          coche: r[0] === 'TRUE' || r[0] === 'VRAI' || r[0] === true,
          cat: r[1] || '', nom: r[2] || '', note: r[3] || '',
          ligneSheet: ligneDebut + i
        }))
        .filter(t => t.nom.trim() !== '');

      if (taches.length === 0) {
        liste.innerHTML = '<div class="vide">Aucune tâche pour aujourd\'hui.</div>';
        return;
      }

      const total = taches.length;
      const cochees = taches.filter(t => t.coche).length;
      const pct = Math.round((cochees / total) * 100);
      document.getElementById('header-pct').textContent = `${cochees}/${total} tâches — ${pct}%`;

      const ordre = ['Me','Luna','House','Job','Study','Sport','Friends','Family','Administratif',''];
      const couleurs = { Me:'#185FA5', Luna:'#E8760A', House:'#1A7F5A', Job:'#6B3FA0', Study:'#0891B2', Sport:'#059669', Friends:'#B5338A', Family:'#B45309', Administratif:'#555555', '':'#999' };

      const groupes = {};
      for (const cat of ordre) groupes[cat] = [];
      for (const t of taches) {
        const cat = ordre.includes(t.cat) ? t.cat : '';
        groupes[cat].push(t);
      }

      let html = '';
      for (const cat of ordre) {
        if (groupes[cat].length === 0) continue;
        const couleur = couleurs[cat] || '#999';
        html += `<div class="groupe-titre" style="background:${couleur}">${cat || 'Autre'}</div>`;
        html += groupes[cat].map(t => `
          <div class="tache" onclick="basculer(${t.ligneSheet}, this)">
            <div class="check ${t.coche ? 'done' : ''}"></div>
            <div class="tache-info">
              <div class="tache-nom ${t.coche ? 'done' : ''}">${t.nom}</div>
              ${t.note ? `<div class="tache-note">${t.note}</div>` : ''}
            </div>
          </div>`).join('');
      }
      liste.innerHTML = html;
    }

    async function basculer(ligneSheet, el) {
      const token = getToken();
      const check = el.querySelector('.check');
      const nom = el.querySelector('.tache-nom');
      const estCoche = check.classList.contains('done');
      const nouvelleValeur = !estCoche;
      check.classList.toggle('done', nouvelleValeur);
      nom.classList.toggle('done', nouvelleValeur);
      const plage = `Objectifs!A${ligneSheet}`;
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${plage}?valueInputOption=RAW`;
      await fetch(url, {
        method: 'PUT',
        headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ range: plage, majorDimension: 'ROWS', values: [[nouvelleValeur]] })
      });
      const taches = document.querySelectorAll('.tache');
      const total = taches.length;
      const cochees = document.querySelectorAll('.check.done').length;
      const pct = Math.round((cochees / total) * 100);
      document.getElementById('header-pct').textContent = `${cochees}/${total} tâches — ${pct}%`;
    }

    // ── Vue Gérer ────────────────────────────────────────

    function construireSeleteurJours() {
      const aujourd = new Date().getDate();
      const dernierJour = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate();
      const container = document.getElementById('selecteur-jours');
      container.innerHTML = '';
      for (let j = 1; j <= dernierJour; j++) {
        const btn = document.createElement('button');
        btn.className = 'jour-btn' + (j === aujourd ? ' today' : '') + (j === jourSelectionne ? ' active' : '');
        btn.textContent = j;
        btn.onclick = () => {
          jourSelectionne = j;
          document.querySelectorAll('.jour-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          fermerFormulaire();
          chargerGestion(j);
        };
        container.appendChild(btn);
      }
      setTimeout(() => {
        const actif = container.querySelector('.active');
        if (actif) actif.scrollIntoView({ inline: 'center', behavior: 'smooth' });
      }, 100);
    }

    async function chargerGestion(jour) {
      const token = getToken();
      if (!token) return;
      const debut = ligneDepart(jour) + 1;
      const fin = debut + 14;
      const plage = `Objectifs!A${debut}:D${fin}`;
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${plage}`;
      const response = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
      const data = await response.json();
      const rows = data.values || [];
      afficherGestion(rows, debut);
    }

    function afficherGestion(rows, ligneDebut) {
      const liste = document.getElementById('liste-gestion');
      const taches = rows
        .map((r, i) => ({ ...r, ligneSheet: ligneDebut + i }))
        .filter(r => r[2] && r[2].trim() !== '');
      if (taches.length === 0) {
        liste.innerHTML = '<div class="vide">Aucune tâche ce jour.</div>';
        return;
      }
      liste.innerHTML = taches.map(t => `
        <div class="tache-gestion">
          <div class="tache-gestion-top">
            <div class="tache-info">
              <div class="tache-gestion-nom">${t[2] || ''}</div>
              ${t[1] ? `<span class="badge badge-${t[1]}">${t[1]}</span>` : ''}
              ${t[3] ? `<div class="tache-gestion-note">${t[3]}</div>` : ''}
            </div>
            <div class="tache-actions">
              <button class="btn-edit" onclick="ouvrirModif(${t.ligneSheet}, '${(t[2]||'').replace(/'/g,"\\'")}', '${(t[1]||'').replace(/'/g,"\\'")}', '${(t[3]||'').replace(/'/g,"\\'")}')">Modifier</button>
              <button class="btn-del" onclick="supprimerTache(${t.ligneSheet})">Supprimer</button>
            </div>
          </div>
        </div>`).join('');
    }

    function ouvrirFormulaire(nom='', cat='', note='') {
      modeFormulaire = 'ajout'; ligneModif = null;
      afficherFormulaire('Ajouter une tâche', nom, cat, note);
    }
    function ouvrirModif(ligne, nom, cat, note) {
      modeFormulaire = 'modif'; ligneModif = ligne;
      afficherFormulaire('Modifier la tâche', nom, cat, note);
    }
    function afficherFormulaire(titre, nom, cat, note) {
      document.getElementById('formulaire-container').innerHTML = `
        <div class="formulaire">
          <h3>${titre}</h3>
          <div class="champ">
            <label>Tâche</label>
            <input type="text" id="f-nom" value="${nom}" placeholder="Ex: Laver le chien" />
          </div>
          <div class="champ">
            <label>Catégorie</label>
            <select id="f-cat">
              <option value="">— Aucune —</option>
              ${['Me','House','Job','Study','Luna','Sport','Friends','Family','Administratif'].map(c =>
                `<option value="${c}" ${cat===c?'selected':''}>${c}</option>`
              ).join('')}
            </select>
          </div>
          <div class="champ">
            <label>Note (optionnel)</label>
            <input type="text" id="f-note" value="${note}" placeholder="Ex: Avec le shampooing spécial" />
          </div>
          <div class="form-actions">
            <button class="btn-cancel" onclick="fermerFormulaire()">Annuler</button>
            <button class="btn-save" onclick="sauvegarderTache()">Enregistrer</button>
          </div>
        </div>`;
    }
    function fermerFormulaire() {
      document.getElementById('formulaire-container').innerHTML = '';
      modeFormulaire = null; ligneModif = null;
    }

    async function sauvegarderTache() {
      const token = getToken();
      const nom = document.getElementById('f-nom').value.trim();
      const cat = document.getElementById('f-cat').value;
      const note = document.getElementById('f-note').value.trim();
      if (!nom) { alert('Le nom de la tâche est obligatoire.'); return; }
      let ligne = ligneModif;
      if (modeFormulaire === 'ajout') {
        const debut = ligneDepart(jourSelectionne) + 1;
        const fin = debut + 14;
        const plage = `Objectifs!A${debut}:D${fin}`;
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${plage}`;
        const response = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
        const data = await response.json();
        const rows = data.values || [];
        let indexVide = rows.findIndex(r => !r[2] || r[2].trim() === '');
        if (indexVide === -1) { alert('Plus de place pour ce jour (15 tâches max).'); return; }
        ligne = debut + indexVide;
      }
      const plage = `Objectifs!A${ligne}:D${ligne}`;
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${plage}?valueInputOption=RAW`;
      await fetch(url, {
        method: 'PUT',
        headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ range: plage, majorDimension: 'ROWS', values: [[false, cat, nom, note]] })
      });
      fermerFormulaire();
      chargerGestion(jourSelectionne);
    }

    async function supprimerTache(ligneSheet) {
      if (!confirm('Supprimer cette tâche ?')) return;
      const token = getToken();
      const plage = `Objectifs!A${ligneSheet}:D${ligneSheet}`;
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${plage}?valueInputOption=RAW`;
      await fetch(url, {
        method: 'PUT',
        headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ range: plage, majorDimension: 'ROWS', values: [[false, '', '', '']] })
      });
      chargerGestion(jourSelectionne);
    }

    // ── Vue Plateau ──────────────────────────────────────

    function setMonth(m) {
      monthMode = m;
      document.getElementById('btn30').classList.toggle('active', m === 30);
      document.getElementById('btn31').classList.toggle('active', m === 31);
      renderPlateau();
    }

    function buildSequence(total) {
      let num = 1, phase = 0;
      const rows = [];
      while (num <= total) {
        if (phase === 0) {
          const row = [];
          for (let c = 0; c < 10; c++) row.push(num <= total ? num++ : null);
          rows.push(row); phase = 1;
        } else if (phase === 1) {
          if (num > total) break;
          const row = new Array(10).fill(null);
          row[9] = num++; rows.push(row); phase = 2;
        } else if (phase === 2) {
          const nums = [];
          for (let c = 0; c < 10; c++) nums.push(num <= total ? num++ : null);
          nums.reverse(); rows.push(nums); phase = 3;
        } else if (phase === 3) {
          if (num > total) break;
          const row = new Array(10).fill(null);
          row[0] = num++; rows.push(row); phase = 0;
        }
      }
      return rows;
    }

    function renderPlateau() {
      const paliers = PALIERS[monthMode];
      const total = TOTAL_CASES[monthMode];
      const score = plateauScore;

      document.getElementById('plateau-score').textContent = score;
      const nextP = paliers.find(p => p > score);
      document.getElementById('plateau-next').textContent = nextP
        ? '> ' + (nextP - score) + ' cases avant le prochain palier'
        : '> tous les paliers atteints !';

      const wrap = document.getElementById('plateau-grid');
      wrap.innerHTML = '';
      const rows = buildSequence(total);

      rows.forEach(row => {
        row.forEach(num => {
          const div = document.createElement('div');
          if (num === null) {
            div.className = 'pcase pempty';
          } else {
            const isPalier = paliers.includes(num);
            const isCurrent = num === score;
            const isDone = num < score;
            const colorClass = num % 2 === 0 ? 'c2' : 'c1';
            let cls = 'pcase';
            if (isCurrent) {
              cls += ' current' + (isPalier ? ' palier' : '');
            } else if (isPalier) {
              cls += ' palier' + (isDone ? ' pdone' : '');
            } else {
              cls += isDone ? ' pdone' : (' ' + colorClass);
            }
            div.className = cls;
            div.textContent = isCurrent ? '★' : (isPalier ? '!' : num);
          }
          wrap.appendChild(div);
        });
      });

      renderPalierCards(paliers, score);

      const celebrated = getCelebrated();
      if (paliers.includes(score) && !celebrated.includes(score)) {
        markCelebrated(score);
        launchConfetti();
        setTimeout(() => showPopup(score), 300);
      }
    }

    function renderPalierCards(paliers, score) {
      const container = document.getElementById('palier-cards');
      container.innerHTML = '';
      for (const p of paliers) {
        const unlocked = score >= p;
        const reward = plateauRewards[p] || '';
        const card = document.createElement('div');
        card.className = 'palier-card' + (unlocked ? ' unlocked' : '');
        card.innerHTML = `
          <div class="palier-card-top">
            <div class="palier-badge ${unlocked ? 'unlocked' : ''}">Case ${p}</div>
            <div class="palier-card-title">${unlocked ? '>> DEBLOQUE' : '>> verrouille'}</div>
          </div>
          ${unlocked ? `
            <div class="palier-reward">${reward || '<span style="color:#7a8aaa">aucune récompense saisie</span>'}</div>
            <input class="reward-input" id="r-${p}" placeholder="Saisir ta récompense..." value="${reward}" />
            <button class="btn-save-reward" onclick="saveReward(${p})">Enregistrer</button>
            <div class="save-ok" id="ok-${p}">Sauvegarde OK !</div>
          ` : `<div style="font-size:7px;color:#7a8aaa;margin-top:4px;font-family:'Press Start 2P',monospace;">Atteins la case ${p} pour débloquer.</div>`}
        `;
        container.appendChild(card);
      }
    }

    function launchConfetti() {
      const canvas = document.getElementById('confetti-canvas');
      const wrap = document.getElementById('retro-wrap');
      canvas.width = wrap.offsetWidth; canvas.height = wrap.offsetHeight;
      const ctx = canvas.getContext('2d');
      confettiParticles = [];
      for (let i = 0; i < 80; i++) {
        confettiParticles.push({
          x: Math.random() * canvas.width, y: -10 - Math.random() * 80,
          w: 6 + Math.random() * 6, h: 8 + Math.random() * 6,
          color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
          vx: (Math.random() - 0.5) * 3, vy: 2 + Math.random() * 3,
          rot: Math.random() * 360, vr: (Math.random() - 0.5) * 8
        });
      }
      if (confettiAnim) cancelAnimationFrame(confettiAnim);
      let elapsed = 0;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let alive = false;
        for (const p of confettiParticles) {
          p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.vy += 0.05;
          if (p.y < canvas.height + 20) alive = true;
          ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI / 180);
          ctx.fillStyle = p.color; ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h); ctx.restore();
        }
        elapsed++;
        if (alive && elapsed < 180) confettiAnim = requestAnimationFrame(draw);
        else ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
      draw();
    }

    function showPopup(palier) {
      const reward = plateauRewards[palier] || '';
      const wrap = document.getElementById('retro-wrap');
      document.querySelectorAll('.popup-overlay').forEach(e => e.remove());
      const overlay = document.createElement('div');
      overlay.className = 'popup-overlay';
      overlay.innerHTML = `
        <div class="popup-box">
          <div class="popup-fighting">Borahae !</div>
          <div class="popup-palier">> PALIER ${palier} ATTEINT</div>
          <div class="popup-reward">${reward ? reward : 'Saisis ta récompense ci-dessous !'}</div>
          <button class="popup-close" onclick="this.closest('.popup-overlay').remove()">CONTINUER</button>
        </div>
      `;
      wrap.appendChild(overlay);
    }

    async function saveReward(palier) {
      const token = getToken();
      const val = document.getElementById('r-' + palier).value.trim();
      plateauRewards[palier] = val;
      if (token) {
        const rowMap = { 30:{30:2,60:3,90:4,120:5,135:6,150:7}, 31:{31:2,62:3,93:4,124:5,140:6,155:7} };
        const row = (rowMap[monthMode] || {})[palier];
        if (row) {
          const plage = `Recompenses!B${row}`;
          await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${plage}?valueInputOption=RAW`, {
            method: 'PUT',
            headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
            body: JSON.stringify({ range: plage, majorDimension: 'ROWS', values: [[val]] })
          });
        }
      }
      const ok = document.getElementById('ok-' + palier);
      ok.style.display = 'block';
      setTimeout(() => ok.style.display = 'none', 2000);
      renderPlateau();
    }

    async function chargerPlateau() {
      const token = getToken();
      if (!token) return;

      const scoreRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Recap!D7:D37`, {
        headers: { Authorization: 'Bearer ' + token }
      });
      const scoreData = await scoreRes.json();
      let score = 0;
      for (const row of (scoreData.values || [])) if (row[0]) score = parseInt(row[0]) || 0;
      plateauScore = score;

      try {
        const rwRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Recompenses!A2:B7`, {
          headers: { Authorization: 'Bearer ' + token }
        });
        const rwData = await rwRes.json();
        for (const row of (rwData.values || [])) if (row[0] && row[1]) plateauRewards[parseInt(row[0])] = row[1];
      } catch(e) {}

      renderPlateau();
    }

    // ── Initialisation ───────────────────────────────────

    window.onload = function() {
      const hash = window.location.hash;
      if (hash.includes('access_token')) {
        const token = new URLSearchParams(hash.substring(1)).get('access_token');
        localStorage.setItem('token', token);
        window.location.hash = '';
      }
      afficherDate();
      chargerTaches();
      construireSeleteurJours();
    };
  </script>
</body>
